name: dh-mysql

services:
  mysql:
    image: mysql:8.0
    container_name: dunhuang-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dunhuang_agent
    ports:
      - "3308:3306"
    volumes:
      - dh_mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  dh_mysql_data:
